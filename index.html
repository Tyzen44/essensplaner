<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 OCR Essensplaner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; background: rgba(255,255,255,0.95); border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #4a5568; font-size: 2.5em; margin-bottom: 10px; }
        .ocr-badge { display: inline-block; background: linear-gradient(135deg, #48bb78, #38a169); color: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; margin-bottom: 20px; }
        .controls { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        button:active { transform: translateY(0); }
        .loading { display: none; text-align: center; padding: 40px; font-size: 18px; color: #4a5568; }
        .loading.active { display: block; }
        .spinner { display: inline-block; width: 50px; height: 50px; border: 3px solid rgba(0,0,0,0.1); border-radius: 50%; border-top-color: #667eea; animation: spin 1s ease-in-out infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .meal-plan { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .day-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.3s ease; }
        .day-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .day-card h3 { color: #2d3748; margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .meal { margin-bottom: 15px; padding: 15px; background: linear-gradient(135deg, #f7fafc, #edf2f7); border-radius: 8px; border-left: 4px solid #667eea; }
        .meal-type { font-weight: 600; color: #4a5568; margin-bottom: 8px; font-size: 14px; }
        .meal-name { color: #2d3748; font-size: 16px; margin-bottom: 5px; font-weight: 500; }
        .meal-details { font-size: 14px; color: #718096; margin-bottom: 10px; }
        .ocr-indicator { display: inline-block; background: #48bb78; color: white; font-size: 12px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
        .shopping-list { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .shopping-list h2 { color: #2d3748; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .store-section { margin-bottom: 20px; padding: 15px; background: linear-gradient(135deg, #f7fafc, #edf2f7); border-radius: 8px; border-left: 4px solid; }
        .store-section.migros { border-left-color: #ff6b35; }
        .store-section.coop { border-left-color: #e53e3e; }
        .store-section.aldi { border-left-color: #3182ce; }
        .store-section.lidl { border-left-color: #38a169; }
        .store-name { font-weight: 600; color: #4a5568; margin-bottom: 10px; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .item-list { list-style: none; padding: 0; }
        .item-list li { padding: 8px 0; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .item-list li:last-child { border-bottom: none; }
        .price { color: #48bb78; font-weight: 600; font-size: 16px; }
        .total-cost { text-align: center; font-size: 24px; font-weight: 700; color: white; margin-top: 20px; padding: 20px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px; }
        .status-message { text-align: center; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; }
        .status-message.success { background: #c6f6d5; color: #22543d; border: 2px solid #48bb78; }
        .status-message.error { background: #fed7d7; color: #742a2a; border: 2px solid #e53e3e; }
        .status-message.info { background: #bee3f8; color: #2c5282; border: 2px solid #3182ce; }
        .demo-notice { background: #fff3cd; border: 2px solid #ffc107; border-radius: 8px; padding: 15px; margin-bottom: 20px; text-align: center; color: #856404; }
        @media (max-width: 768px) { .container { padding: 15px; border-radius: 0; margin: 0; min-height: 100vh; } body { padding: 0; } .header h1 { font-size: 1.8em; } .controls { flex-direction: column; } button { width: 100%; padding: 15px; font-size: 17px; } .meal-plan { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 OCR Essensplaner</h1>
            <div class="ocr-badge">🔍 Computer Vision • Tesseract OCR • Anti-Bot-Umgehung</div>
            <p style="color: #718096;">Intelligente Angebots-Erkennung aus Supermarkt-Websites</p>
        </div>
        
        <div class="controls">
            <button onclick="fetchDeals()">🔄 Angebote abrufen (OCR)</button>
            <button onclick="generateMealPlan()">📅 Essensplan generieren</button>
            <button onclick="exportPDF()" style="background: linear-gradient(135deg, #e53e3e, #c53030);">📄 Als PDF</button>
            <button onclick="showSystemInfo()" style="background: linear-gradient(135deg, #38a169, #2f855a);">ℹ️ System Info</button>
        </div>

        <div id="statusMessage"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>🤖 OCR analysiert Supermarkt-Websites...</p>
            <p style="font-size: 14px; color: #718096; margin-top: 10px;">
                Computer Vision erkennt Angebote aus Screenshots
            </p>
        </div>

        <div id="mealPlanContainer"></div>
        <div id="shoppingListContainer"></div>
    </div>

    <script>
        let currentDeals = {};
        let mealPlan = {};
        let shoppingList = {};
        
        // Status-Nachrichten anzeigen
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerHTML = message;
            statusDiv.className = `status-message ${type}`;
            statusDiv.style.display = 'block';
            
            if (type === 'success' || type === 'info') {
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 5000);
            }
        }

        // Angebote von GitHub abrufen
        async function fetchDeals() {
            const loading = document.getElementById('loading');
            loading.classList.add('active');
            
            try {
                showStatus('🤖 Lade OCR-Angebote von GitHub...', 'info');
                
                const response = await fetch('deals.json?t=' + new Date().getTime());
                
                if (!response.ok) {
                    throw new Error('deals.json nicht gefunden - GitHub Action noch nicht ausgeführt?');
                }
                
                const data = await response.json();
                
                // Validiere OCR-Daten
                if (!data.migros || !data.coop || !data.aldi || !data.lidl) {
                    throw new Error('Ungültiges Datenformat in deals.json');
                }
                
                const totalDeals = data.migros.length + data.coop.length + data.aldi.length + data.lidl.length;
                
                if (totalDeals === 0) {
                    throw new Error('Keine Angebote gefunden - OCR-Erkennung fehlgeschlagen');
                }
                
                currentDeals = {
                    'Migros': data.migros,
                    'Coop': data.coop,
                    'Aldi': data.aldi,
                    'Lidl': data.lidl
                };
                
                const lastUpdate = new Date(data.lastUpdate).toLocaleString('de-CH');
                const method = data.method || 'OCR-Computer-Vision';
                
                showStatus(
                    `✅ ${totalDeals} Angebote durch ${method} erkannt!<br>
                     🟠 Migros: ${data.migros.length} • 🔴 Coop: ${data.coop.length} • 
                     🔵 Aldi: ${data.aldi.length} • 🟢 Lidl: ${data.lidl.length}<br>
                     <small>Stand: ${lastUpdate}</small>`, 
                    'success'
                );
                
            } catch (error) {
                showStatus(`❌ ${error.message}`, 'error');
            } finally {
                loading.classList.remove('active');
            }
        }

        // Intelligente Essensplan-Generierung
        function generateMealPlan() {
            if (Object.keys(currentDeals).length === 0) {
                showStatus('⚠️ Bitte laden Sie zuerst die Angebote!', 'error');
                return;
            }

            const days = ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag', 'Sonntag'];
            
            // Sammle alle Angebote
            const allDeals = [];
            Object.entries(currentDeals).forEach(([store, deals]) => {
                deals.forEach(deal => {
                    allDeals.push({ ...deal, store: store });
                });
            });

            if (allDeals.length < 3) {
                showStatus('⚠️ Zu wenige Angebote für Essensplan (mindestens 3 benötigt)', 'error');
                return;
            }

            mealPlan = {};
            shoppingList = {};

            // Generiere für jeden Tag ein intelligentes Rezept
            days.forEach((day, index) => {
                const dayDeals = [...allDeals].sort(() => Math.random() - 0.5);
                const dinner = generateIntelligentRecipe(dayDeals, day);
                
                mealPlan[day] = { dinner: dinner };

                // Zusätzlich Mittagessen für Kinder (Di + Do)
                if (day === 'Dienstag' || day === 'Donnerstag') {
                    const lunch = generateKidsLunch(dayDeals);
                    if (lunch) mealPlan[day].lunch = lunch;
                }
            });

            // Erstelle intelligente Einkaufsliste
            generateShoppingList();
            
            // Zeige Ergebnisse
            displayMealPlan();
            displayShoppingList();
            
            showStatus(`🎉 Essensplan mit ${allDeals.length} OCR-Angeboten generiert!`, 'success');
        }

        // Generiere intelligentes Rezept basierend auf verfügbaren Angeboten
        function generateIntelligentRecipe(deals, day) {
            const mealTemplates = [
                'Pasta mit {ingredient}',
                '{ingredient} mit Beilage', 
                '{ingredient} Pfanne',
                'Gebratenes {ingredient}',
                '{ingredient} Auflauf',
                'Einfaches {ingredient} Gericht'
            ];
            
            const ingredient = deals[Math.floor(Math.random() * Math.min(deals.length, 10))];
            const template = mealTemplates[Math.floor(Math.random() * mealTemplates.length)];
            
            return {
                name: template.replace('{ingredient}', ingredient.name),
                servings: '4 Portionen',
                price: ingredient.price,
                store: ingredient.store,
                unit: ingredient.unit || 'Stück',
                ocrGenerated: true
            };
        }

        // Generiere Kinder-Mittagessen
        function generateKidsLunch(deals) {
            const kidsFriendly = deals.filter(d => 
                /pasta|nudel|brot|käse|milch|joghurt|apfel|banane/i.test(d.name)
            );
            
            if (kidsFriendly.length > 0) {
                const ingredient = kidsFriendly[0];
                return {
                    name: `Kinder-${ingredient.name}`,
                    servings: '2 Kinder',
                    price: ingredient.price * 0.5,
                    store: ingredient.store,
                    ocrGenerated: true
                };
            }
            return null;
        }

        // Generiere Einkaufsliste aus Rezepten
        function generateShoppingList() {
            shoppingList = {};
            
            Object.values(mealPlan).forEach(day => {
                ['dinner', 'lunch'].forEach(mealType => {
                    if (day[mealType]) {
                        const meal = day[mealType];
                        const store = meal.store;
                        
                        if (!shoppingList[store]) {
                            shoppingList[store] = [];
                        }
                        
                        const existingItem = shoppingList[store].find(item => 
                            item.name === meal.name
                        );
                        
                        if (!existingItem) {
                            shoppingList[store].push({
                                name: meal.name,
                                price: meal.price,
                                unit: meal.unit || 'Stück',
                                ocrSource: true
                            });
                        }
                    }
                });
            });
        }

        // Zeige Essensplan
        function displayMealPlan() {
            const container = document.getElementById('mealPlanContainer');
            container.innerHTML = '<h2 style="text-align: center; margin-bottom: 20px;">📅 OCR-Generierter Wochenplan</h2>';
            
            const planGrid = document.createElement('div');
            planGrid.className = 'meal-plan';

            Object.entries(mealPlan).forEach(([day, meals]) => {
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';
                
                let cardHTML = `<h3>${day}</h3>`;
                
                if (meals.dinner) {
                    cardHTML += `
                        <div class="meal">
                            <div class="meal-type">🌙 Abendessen <span class="ocr-indicator">OCR</span></div>
                            <div class="meal-name">${meals.dinner.name}</div>
                            <div class="meal-details">${meals.dinner.servings} - CHF ${meals.dinner.price?.toFixed(2) || '0.00'}</div>
                            <div class="meal-details">📍 ${meals.dinner.store}</div>
                        </div>
                    `;
                }
                
                if (meals.lunch) {
                    cardHTML += `
                        <div class="meal">
                            <div class="meal-type">☀️ Mittagessen <span class="ocr-indicator">OCR</span></div>
                            <div class="meal-name">${meals.lunch.name}</div>
                            <div class="meal-details">${meals.lunch.servings} - CHF ${meals.lunch.price?.toFixed(2) || '0.00'}</div>
                            <div class="meal-details">📍 ${meals.lunch.store}</div>
                        </div>
                    `;
                }
                
                dayCard.innerHTML = cardHTML;
                planGrid.appendChild(dayCard);
            });
            
            container.appendChild(planGrid);
        }

        // Zeige Einkaufsliste
        function displayShoppingList() {
            const container = document.getElementById('shoppingListContainer');
            container.innerHTML = '';
            
            const listDiv = document.createElement('div');
            listDiv.className = 'shopping-list';
            listDiv.innerHTML = '<h2>🛒 OCR-basierte Einkaufsliste</h2>';
            
            let totalCost = 0;
            const storeEmojis = { 'Migros': '🟠', 'Coop': '🔴', 'Aldi': '🔵', 'Lidl': '🟢' };

            Object.entries(shoppingList).forEach(([store, items]) => {
                const storeSection = document.createElement('div');
                storeSection.className = `store-section ${store.toLowerCase()}`;
                
                let storeCost = 0;
                let itemsHTML = '<ul class="item-list">';
                
                items.forEach(item => {
                    itemsHTML += `
                        <li>
                            <span>${item.name} (${item.unit})</span>
                            <span class="price">CHF ${item.price.toFixed(2)}</span>
                        </li>
                    `;
                    storeCost += item.price;
                });
                
                itemsHTML += '</ul>';
                
                storeSection.innerHTML = `
                    <div class="store-name">
                        ${storeEmojis[store] || '🏪'} ${store}
                        <span class="ocr-indicator">OCR</span>
                    </div>
                    ${itemsHTML}
                    <div style="text-align: right; margin-top: 10px; font-weight: 600;">
                        Zwischensumme: CHF ${storeCost.toFixed(2)}
                    </div>
                `;
                
                listDiv.appendChild(storeSection);
                totalCost += storeCost;
            });
            
            listDiv.innerHTML += `
                <div class="total-cost">
                    💰 Gesamtkosten: CHF ${totalCost.toFixed(2)}
                    <div style="font-size: 16px; margin-top: 8px; opacity: 0.9;">
                        🤖 Durch Computer Vision erkannt
                    </div>
                </div>
            `;
            
            container.appendChild(listDiv);
        }

        function exportPDF() {
            if (Object.keys(mealPlan).length === 0) {
                showStatus('⚠️ Bitte generieren Sie zuerst einen Essensplan!', 'error');
                return;
            }

            let exportText = 'OCR ESSENSPLANER\n================\n\n';
            exportText += `Erstellt: ${new Date().toLocaleDateString('de-CH')}\n`;
            exportText += 'Methode: OCR Computer Vision\n\n';
            
            Object.entries(mealPlan).forEach(([day, meals]) => {
                exportText += `${day}:\n`;
                if (meals.dinner) {
                    exportText += `  Abendessen: ${meals.dinner.name}\n`;
                    exportText += `  Preis: CHF ${meals.dinner.price?.toFixed(2) || '0.00'}\n`;
                    exportText += `  Store: ${meals.dinner.store}\n`;
                }
                if (meals.lunch) {
                    exportText += `  Mittagessen: ${meals.lunch.name}\n`;
                    exportText += `  Preis: CHF ${meals.lunch.price?.toFixed(2) || '0.00'}\n`;
                }
                exportText += '\n';
            });

            exportText += '\nEINKAUFSLISTE\n=============\n\n';
            Object.entries(shoppingList).forEach(([store, items]) => {
                exportText += `${store}:\n`;
                items.forEach(item => {
                    exportText += `  - ${item.name}: CHF ${item.price.toFixed(2)}\n`;
                });
                exportText += '\n';
            });

            const blob = new Blob([exportText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `OCR-Essensplan-${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            
            showStatus('✅ Plan als Textdatei exportiert!', 'success');
        }

        function showSystemInfo() {
            const totalDeals = Object.values(currentDeals).reduce((sum, deals) => sum + deals.length, 0);
            
            const infoText = `🤖 OCR-Essensplaner System Info

📊 Status: ${totalDeals > 0 ? 'Live OCR-Daten' : 'Keine Daten'}
🔍 OCR-Engine: Tesseract.js
🌐 Methode: Computer Vision + Screenshot-Analyse
📅 Letzte Aktualisierung: ${new Date().toLocaleString('de-CH')}

🏪 Erkannte Angebote:
🟠 Migros: ${currentDeals.Migros?.length || 0} Angebote
🔴 Coop: ${currentDeals.Coop?.length || 0} Angebote  
🔵 Aldi: ${currentDeals.Aldi?.length || 0} Angebote
🟢 Lidl: ${currentDeals.Lidl?.length || 0} Angebote

📈 Gesamt: ${totalDeals} Angebote durch OCR erkannt

🔧 Technologie:
- Anti-Bot-Umgehung: Puppeteer Stealth
- Bildverarbeitung: Sharp.js
- Texterkennung: Tesseract.js (deu+eng)
- Automatisierung: GitHub Actions

✨ System läuft ${totalDeals > 0 ? 'erfolgreich' : 'wartend auf Daten'}!`;
            
            alert(infoText);
        }

        // Auto-Load beim Start
        window.addEventListener('load', () => {
            showStatus('🤖 OCR-Essensplaner geladen! Klicken Sie "Angebote abrufen" um zu starten.', 'info');
            
            // Automatischer Versuch Daten zu laden nach 1 Sekunde
            setTimeout(() => {
                fetchDeals();
            }, 1000);
        });
    </script>
</body>
</html>
