    <title>Wöchentlicher Essensplaner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #4a5568;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .meal-plan {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .day-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .day-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .day-card h3 {
            color: #2d3748;
            margin-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .meal {
            margin-bottom: 15px;
            padding: 10px;
            background: #f7fafc;
            border-radius: 8px;
        }

        .meal-type {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 5px;
        }

        .meal-name {
            color: #2d3748;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .meal-details {
            font-size: 14px;
            color: #718096;
        }

        .shopping-list {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .shopping-list h2 {
            color: #2d3748;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .store-section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 8px;
        }

        .store-name {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .item-list {
            list-style: none;
            padding-left: 0;
        }

        .item-list li {
            padding: 5px 0;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-list li:last-child {
            border-bottom: none;
        }

        .price {
            color: #48bb78;
            font-weight: 600;
        }

        .total-cost {
            text-align: right;
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
        }

        .recipe-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .recipe-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .recipe-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #e2e8f0;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .recipe-content h3 {
            color: #2d3748;
            margin-bottom: 20px;
        }

        .recipe-content h4 {
            color: #4a5568;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .recipe-content ul, .recipe-content ol {
            padding-left: 20px;
            line-height: 1.8;
        }

        .error-message {
            display: none;
            background: #fed7d7;
            color: #742a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .error-message.active {
            display: block;
        }

        .preferences-panel {
            display: none;
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            animation: slideDown 0.3s ease-out;
        }

        .preferences-panel.active {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .preferences-panel h3 {
            color: #2d3748;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .preference-section {
            margin-bottom: 25px;
        }

        .preference-section h4 {
            color: #4a5568;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .category-filters, .cuisine-preferences {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: #f7fafc;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .checkbox-label:hover {
            background: #edf2f7;
        }

        .checkbox-label input {
            margin-right: 8px;
            cursor: pointer;
        }

        .checkbox-label span {
            font-size: 14px;
            color: #2d3748;
        }

        .exclusion-list {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .exclusion-list input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
        }

        .exclusion-list input:focus {
            outline: none;
            border-color: #667eea;
        }

        .excluded-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .excluded-item {
            background: #fed7d7;
            color: #742a2a;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .excluded-item button {
            background: none;
            border: none;
            color: #742a2a;
            cursor: pointer;
            padding: 0;
            margin: 0;
            font-size: 18px;
            line-height: 1;
        }

        .preference-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
        }

        .personal-settings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
        }

        .favorites-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .favorite-meal {
            background: #f0f9ff;
            border: 2px solid #3182ce;
            color: #2c5282;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .favorite-meal:hover {
            background: #3182ce;
            color: white;
            transform: scale(1.05);
        }

        .meal-rating {
            display: inline-flex;
            gap: 3px;
            margin-left: 10px;
            cursor: pointer;
        }

        .meal-rating span {
            font-size: 16px;
            opacity: 0.3;
            transition: opacity 0.2s;
        }

        .meal-rating span:hover,
        .meal-rating span.active {
            opacity: 1;
        }

        .quick-actions {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .quick-actions button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            padding: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
                border-radius: 0;
                min-height: 100vh;
            }

            body {
                padding: 0;
            }

            h1 {
                font-size: 1.8em;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            button {
                width: 100%;
                padding: 15px;
                font-size: 17px;
            }

            .meal-plan {
                grid-template-columns: 1fr;
            }

            .preferences-panel {
                border-radius: 0;
                margin: 0 -15px;
                padding: 20px 15px;
            }

            .category-filters, .cuisine-preferences {
                grid-template-columns: 1fr;
            }

            .recipe-content {
                width: 95%;
                margin: 20px auto;
            }
        }

        /* iOS-spezifische Anpassungen */
        @supports (-webkit-touch-callout: none) {
            .container {
                padding-bottom: env(safe-area-inset-bottom);
            }
            
            button {
                -webkit-tap-highlight-color: transparent;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<body>
    <div class="container">
        <h1>🍽️ Wöchentlicher Essensplaner</h1>
        
        <div class="controls">
            <button onclick="fetchDeals()">🔄 Aktuelle Angebote abrufen</button>
            <button onclick="generateMealPlan()">📅 Essensplan generieren</button>
            <button onclick="togglePreferences()">⚙️ Präferenzen</button>
            <button onclick="exportPDF()" style="background: #e53e3e;">📄 Als PDF speichern</button>
            <button onclick="exportPlan()">📝 Als Text exportieren</button>
        </div>

        <div class="preferences-panel" id="preferencesPanel">
            <h3>🍽️ Ihre Präferenzen</h3>
            
            <div class="preference-section">
                <h4>Kategorien ausschließen:</h4>
                <div class="category-filters">
                    <label class="checkbox-label">
                        <input type="checkbox" id="excludeFish" onchange="savePreferences()">
                        <span>🐟 Kein Fisch</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="excludeMeat" onchange="savePreferences()">
                        <span>🥩 Kein Fleisch</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="excludePoultry" onchange="savePreferences()">
                        <span>🍗 Kein Geflügel</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="excludeDairy" onchange="savePreferences()">
                        <span>🥛 Keine Milchprodukte</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="excludeGluten" onchange="savePreferences()">
                        <span>🌾 Glutenfrei</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="vegetarian" onchange="toggleVegetarian()">
                        <span>🥗 Vegetarisch</span>
                    </label>
                </div>
            </div>

            <div class="preference-section">
                <h4>Spezifische Lebensmittel ausschließen:</h4>
                <div class="exclusion-list">
                    <input type="text" id="excludeInput" placeholder="z.B. Brokkoli, Zwiebeln...">
                    <button onclick="addExclusion()">➕ Hinzufügen</button>
                </div>
                <div id="excludedItems" class="excluded-items"></div>
            </div>

            <div class="preference-section">
                <h4>Praktische Einstellungen:</h4>
                <div class="personal-settings">
                    <label class="checkbox-label">
                        <input type="checkbox" id="preferQuick" onchange="savePreferences()">
                        <span>⏱️ Bevorzuge schnelle Gerichte (&lt;30 Min)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="extraPortions" onchange="savePreferences()">
                        <span>🍱 Extra Portionen (für morgen mitnehmen)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="budgetMode" onchange="savePreferences()">
                        <span>💰 Budget-Modus (günstigste Optionen)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="simpleRecipes" onchange="savePreferences()">
                        <span>👶 Einfache Rezepte (wenige Zutaten)</span>
                    </label>
                </div>
            </div>

            <div class="preference-actions">
                <button onclick="resetPreferences()">🔄 Zurücksetzen</button>
                <button onclick="togglePreferences()" style="background: #48bb78;">✓ Fertig</button>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Suche nach aktuellen Angeboten...</p>
        </div>

        <div id="mealPlanContainer"></div>
        <div id="shoppingListContainer"></div>
    </div>

    <div class="recipe-modal" id="recipeModal">
        <div class="recipe-content">
            <button class="close-modal" onclick="closeRecipeModal()">×</button>
            <div id="recipeDetails"></div>
        </div>
    </div>

    <script>
        // Service Worker Registration für Offline-Funktionalität
        if ('serviceWorker' in navigator) {
            // Erstelle Service Worker als Blob
            const swCode = `
                self.addEventListener('install', e => {
                    e.waitUntil(
                        caches.open('essensplaner-v1').then(cache => {
                            return cache.addAll(['/']);
                        })
                    );
                });

                self.addEventListener('fetch', e => {
                    e.respondWith(
                        caches.match(e.request).then(response => {
                            return response || fetch(e.request);
                        })
                    );
                });
            `;
            
            // Registriere Service Worker nur wenn online gehostet
            if (window.location.protocol === 'https:' || window.location.hostname === 'localhost') {
                // Service Worker würde hier registriert werden
                console.log('PWA-Modus verfügbar');
            }
        }
        let currentDeals = {};
        let mealPlan = {};
        let shoppingList = {};
        let userPreferences = {
            excludeCategories: [],
            excludeItems: [],
            preferQuick: false,
            extraPortions: false,
            budgetMode: false,
            simpleRecipes: false
        };

        // Lade gespeicherte Präferenzen beim Start
        window.addEventListener('load', function() {
            loadPreferences();
            checkSystemStatus();
        });

        // System Status Check
        async function checkSystemStatus() {
            try {
                const response = await fetch('deals.json?t=' + new Date().getTime());
                if (!response.ok) {
                    showSetupInstructions();
                } else {
                    const data = await response.json();
                    if (!data.lastUpdate || Object.values(data).filter(Array.isArray).every(arr => arr.length === 0)) {
                        showNotification('⚠️ Keine Angebote vorhanden. Bitte führen Sie die GitHub Action aus!', 'warning');
                    } else {
                        showNotification('✅ System bereit! Klicken Sie "Aktuelle Angebote abrufen"', 'success');
                    }
                }
            } catch (error) {
                showSetupInstructions();
            }
        }

        // Zeige Setup-Anleitung
        function showSetupInstructions() {
            const container = document.getElementById('mealPlanContainer');
            container.innerHTML = `

        // Intelligente Rezept-Generierung basierend auf Angeboten
        function generateRecipeFromDeals(availableDeals, dayName) {
            // Kategorisiere verfügbare Angebote
            const categorizedDeals = {
                pasta: [],
                fleisch: [],
                fisch: [],
                gemüse: [],
                milchprodukte: [],
                beilage: [],
                protein: []
            };

            availableDeals.forEach(deal => {
                const name = deal.name.toLowerCase();
                const category = deal.category?.toLowerCase() || '';
                
                // Kategorisierung
                if (name.includes('pasta') || name.includes('nudel') || name.includes('spaghetti')) {
                    categorizedDeals.pasta.push(deal);
                }
                if (category === 'fleisch' || name.includes('fleisch') || name.includes('schnitzel')) {
                    categorizedDeals.fleisch.push(deal);
                    categorizedDeals.protein.push(deal);
                }
                if (category === 'fisch' || name.includes('lachs') || name.includes('fisch')) {
                    categorizedDeals.fisch.push(deal);
                    categorizedDeals.protein.push(deal);
                }
                if (category === 'gemüse' || name.includes('tomate') || name.includes('broccoli')) {
                    categorizedDeals.gemüse.push(deal);
                }
                if (name.includes('reis') || name.includes('kartoffel')) {
                    categorizedDeals.beilage.push(deal);
                }
            });

            // Wähle Template basierend auf verfügbaren Zutaten
            let selectedRecipe = null;
            let selectedTemplate = null;

            // Durchsuche alle Templates
            for (const [templateType, templateData] of Object.entries(recipeTemplates)) {
                for (const variation of templateData.variations) {
                    let canMake = true;
                    let ingredients = {};
                    
                    // Prüfe ob alle benötigten Zutaten verfügbar sind
                    for (const need of variation.needs) {
                        if (categorizedDeals[need].length === 0) {
                            canMake = false;
                            break;
                        }
                        // Wähle günstigste Option
                        ingredients[need.toUpperCase()] = categorizedDeals[need]
                            .sort((a, b) => a.price - b.price)[0];
                    }

                    if (canMake) {
                        // Erstelle Rezept aus Template
                        selectedRecipe = {
                            name: variation.name,
                            ingredients: ingredients,
                            template: variation,
                            baseRecipe: templateData.baseRecipe
                        };
                        selectedTemplate = templateType;
                        break;
                    }
                }
                if (selectedRecipe) break;
            }

            // Generiere finales Rezept
            if (selectedRecipe) {
                // Ersetze Platzhalter mit echten Zutaten
                let recipeName = selectedRecipe.name;
                let instructions = [...selectedRecipe.template.template];
                
                Object.entries(selectedRecipe.ingredients).forEach(([placeholder, deal]) => {
                    recipeName = recipeName.replace(`{${placeholder}}`, deal.name);
                    instructions = instructions.map(step => 
                        step.replace(`{${placeholder}}`, deal.name)
                    );
                });

                // Berechne Zutaten mit Mengen
                const ingredientsList = Object.values(selectedRecipe.ingredients).map(deal => {
                    // Mengen-Berechnung für 4 Personen
                    let amount = '400g'; // Standard
                    if (deal.category === 'fleisch' || deal.category === 'fisch') amount = '600g';
                    if (deal.category === 'gemüse') amount = '500g';
                    if (deal.name.includes('reis')) amount = '300g';
                    if (deal.name.includes('pasta')) amount = '400g';
                    
                    // Extra Portionen wenn gewünscht

                        const baseAmount = parseInt(amount);
                        amount = Math.round(baseAmount * 1.5) + amount.replace(/\d+/, '');
                    }
                    
                    return `${amount} ${deal.name} (${deal.store} - CHF ${deal.price.toFixed(2)})`;
                });

                return {
                    name: recipeName,
                    servings: '2 Erwachsene + 2 Kinder',
                    recipe: {
                        ingredients: ingredientsList,
                        instructions: instructions,
                        time: selectedRecipe.baseRecipe.time,

                    }

            // Fallback auf einfache Rezepte

        // Funktion zum Abrufen der Angebote
        async function fetchDeals() {
            const loading = document.getElementById('loading');
            const errorMessage = document.getElementById('errorMessage');
            
            loading.classList.add('active');
            loading.innerHTML = '<div class="spinner"></div><p>Lade aktuelle Angebote...</p>';
            errorMessage.classList.remove('active');
            
            try {
                // Lade deals.json von GitHub
                const response = await fetch('deals.json?t=' + new Date().getTime());
                
                if (!response.ok) {
                    throw new Error('Datei deals.json nicht gefunden');
                }
                
                const data = await response.json();
                
                // Prüfe ob echte Daten vorhanden sind
                if (!data.migros || !data.coop || !data.aldi || !data.lidl) {
                    throw new Error('Ungültiges Datenformat in deals.json');
                }
                
                const totalDeals = data.migros.length + data.coop.length + data.aldi.length + data.lidl.length;
                
                if (totalDeals === 0) {
                    loading.classList.remove('active');
                    errorMessage.innerHTML = `
                        <strong>❌ Keine Angebote gefunden!</strong><br>
                        Die GitHub Action wurde noch nicht ausgeführt.<br>
                        Gehen Sie zu Actions → "Scrape Supermarkt Angebote" → "Run workflow"
                    `;
                    errorMessage.classList.add('active');
                    return;
                }
                
                // Verwende echte Daten
                currentDeals = {
                    'Migros': data.migros,
                    'Coop': data.coop,
                    'Aldi': data.aldi,
                    'Lidl': data.lidl
                };
                
                const lastUpdate = new Date(data.lastUpdate).toLocaleString('de-CH');
                
                loading.classList.remove('active');
                showNotification(`✅ ${totalDeals} aktuelle Angebote geladen! (Stand: ${lastUpdate})`, 'success');
                
                // Zeige nächstes Update
                if (data.nextUpdate) {
                    const nextUpdate = new Date(data.nextUpdate).toLocaleString('de-CH');
                    console.log(`Nächstes Update: ${nextUpdate}`);
                }
                
            } catch (error) {
                loading.classList.remove('active');
                
                if (error.message.includes('deals.json nicht gefunden')) {
                    errorMessage.innerHTML = `
                        <strong>❌ Setup nicht vollständig!</strong><br>
                        Die Datei deals.json fehlt. Bitte erstellen Sie diese im Repository.<br>
                        <a href="https://github.com/Tyzen44/essensplaner/new/main" target="_blank" style="color: #742a2a; text-decoration: underline;">
                            → Datei jetzt erstellen
                        </a>
                    `;
                } else {
                    errorMessage.innerHTML = `
                        <strong>❌ Fehler beim Laden der Angebote</strong><br>
                        ${error.message}<br>
                        Prüfen Sie die GitHub Actions Logs für Details.
                    `;
                }
                
                errorMessage.classList.add('active');
            }
        }

        // Funktion zum Generieren des Essensplans
        function generateMealPlan() {
            if (Object.keys(currentDeals).length === 0) {
                const errorMessage = document.getElementById('errorMessage');
                errorMessage.innerHTML = `
                    <strong>❌ Keine Angebote vorhanden!</strong><br>
                    Bitte klicken Sie zuerst auf "Aktuelle Angebote abrufen".<br>
                    Falls das nicht funktioniert, prüfen Sie das GitHub Actions Setup.
                `;
                errorMessage.classList.add('active');
                return;
            }

            const days = ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag', 'Sonntag'];
            
            // Sammle alle Angebote in einer flachen Liste
            const allDeals = [];
            Object.entries(currentDeals).forEach(([store, deals]) => {
                if (!Array.isArray(deals)) {
                    showNotification('❌ Fehlerhafte Datenstruktur in deals.json', 'error');
                    return;
                }
                deals.forEach(deal => {
                    allDeals.push({ ...deal, store: store });
                });
            });

            // Prüfe Kategorie-Ausschlüsse bei der Rezeptgenerierung
            if (userPreferences.excludeCategories.length > 0) {
                // Filtere Angebote basierend auf ausgeschlossenen Kategorien
                for (let i = allDeals.length - 1; i >= 0; i--) {
                    const deal = allDeals[i];
                    const category = (deal.category || '').toLowerCase();
                    
                    // Prüfe ob Kategorie ausgeschlossen ist
                    if (userPreferences.excludeCategories.includes('fish') && category === 'fisch') {
                        allDeals.splice(i, 1);
                    } else if (userPreferences.excludeCategories.includes('meat') && category === 'fleisch') {
                        allDeals.splice(i, 1);
                    } else if (userPreferences.excludeCategories.includes('poultry') && category === 'geflügel') {
                        allDeals.splice(i, 1);
                    } else if (userPreferences.excludeCategories.includes('dairy') && category === 'milchprodukte') {
                        allDeals.splice(i, 1);
                    }
                    
                    // Prüfe spezifische Ausschlüsse
                    for (let excludeItem of userPreferences.excludeItems) {
                        if (deal.name.toLowerCase().includes(excludeItem.toLowerCase())) {
                            allDeals.splice(i, 1);
                            break;
                        }
                    }
                }
            }

            // Prüfe ob nach Filterung noch genug Angebote vorhanden sind
            if (allDeals.length < 10) {
                const errorMessage = document.getElementById('errorMessage');
                errorMessage.innerHTML = `
                    <strong>⚠️ Zu wenige Angebote gefunden (${allDeals.length})</strong><br>
                    Mindestens 10 verschiedene Produkte werden benötigt.<br>
                    Möglicherweise ist der Scraper fehlgeschlagen. Prüfen Sie die GitHub Actions Logs.
                `;
                errorMessage.classList.add('active');
                return;
            }

            mealPlan = {};
            shoppingList = {};

            // Generiere für jeden Tag ein Rezept basierend auf Angeboten
            days.forEach((day, index) => {
                // Rotiere durch die Angebote für Abwechslung
                const dayDeals = [...allDeals].sort(() => Math.random() - 0.5);
                
                // Generiere Rezept aus verfügbaren Angeboten
                const dinner = generateRecipeFromDeals(dayDeals, day);
                
                if (!dinner) {
                    showNotification(`❌ Konnte kein Rezept für ${day} generieren`, 'error');
                    return;
                }
                
                mealPlan[day] = {
                    dinner: dinner
                };

                // Füge Mittagessen für Dienstag und Donnerstag hinzu
                if (day === 'Dienstag' || day === 'Donnerstag') {
                    // Versuche Kinder-Mittagessen zu generieren
                    const lunch = generateKidsLunch(dayDeals);
                    if (lunch) {
                        mealPlan[day].lunch = lunch;
                    }
                }
            });

            // Prüfe ob Plan vollständig ist
            if (Object.keys(mealPlan).length < 7) {
                showNotification('⚠️ Wochenplan konnte nicht vollständig erstellt werden', 'warning');
            }

            // Erstelle Einkaufsliste basierend auf generierten Rezepten
            calculateShoppingListFromGeneratedRecipes();
            
            // Zeige den Plan an
            displayMealPlan();
            displayShoppingList();
            
            showNotification(`✅ Essensplan mit ${allDeals.length} aktuellen Angeboten generiert!`, 'success');
        }

        // Generiere Kinder-Mittagessen
        function generateKidsLunch(deals) {
            // Suche nach kinderfreundlichen Zutaten
            const pasta = deals.find(d => d.name.toLowerCase().includes('nudel') || d.name.toLowerCase().includes('pasta'));
            const tomaten = deals.find(d => d.name.toLowerCase().includes('tomate'));
            const käse = deals.find(d => d.name.toLowerCase().includes('käse'));
            
            if (pasta && tomaten) {
                return {
                    name: 'Nudeln mit Tomatensauce',
                    servings: '2 Kinder (2 Jahre)',
                    recipe: {
                        ingredients: [
                            `200g ${pasta.name} (${pasta.store} - CHF ${pasta.price.toFixed(2)})`,
                            `200g ${tomaten.name} (${tomaten.store} - CHF ${tomaten.price.toFixed(2)})`,
                            käse ? `50g ${käse.name} (${käse.store} - CHF ${käse.price.toFixed(2)})` : '50g Käse (optional)'
                        ],
                        instructions: [
                            'Nudeln weich kochen (2 Minuten länger als angegeben)',
                            'Tomaten pürieren und erwärmen',
                            'Nudeln mit Sauce mischen',
                            käse ? 'Mit geriebenem Käse servieren' : 'Warm servieren'
                        ],
                        time: '15 Min',
                        difficulty: 'Sehr einfach',
                        totalCost: (pasta.price + tomaten.price + (käse ? käse.price : 0)).toFixed(2)
                    }
                };
            }
            
            return null;
        }

        // Neue Funktion für Einkaufsliste aus generierten Rezepten
        function calculateShoppingListFromGeneratedRecipes() {
            shoppingList = {};

            Object.values(mealPlan).forEach(day => {
                ['dinner', 'lunch'].forEach(mealType => {
                    if (day[mealType] && day[mealType].recipe && day[mealType].recipe.ingredients) {
                        day[mealType].recipe.ingredients.forEach(ingredient => {
                            // Parse Zutat (z.B. "400g Pouletbrust (Migros - CHF 9.50)")
                            const match = ingredient.match(/(\d+g|\d+ml|\d+\s*Stück)?\s*(.+?)\s*\((.+?)\s*-\s*CHF\s*([\d.]+)\)/);
                            
                            if (match) {
                                const amount = match[1] || '';
                                const name = match[2];
                                const store = match[3];
                                const price = parseFloat(match[4]);

                                if (!shoppingList[store]) {
                                    shoppingList[store] = [];
                                }

                                // Prüfe ob bereits vorhanden
                                const existing = shoppingList[store].find(item => item.name === name);
                                if (!existing) {
                                    shoppingList[store].push({
                                        name: name,
                                        price: price,
                                        unit: amount,
                                        store: store
                                    });
                                }
                            }
                        });
                    }
                });
            });
        }

        // Filtere Rezepte basierend auf Benutzerpräferenzen
        function filterRecipesByPreferences() {
            return Object.keys(recipes).filter(recipeName => {
                const recipe = recipes[recipeName];
                
                // Überspringe Kinderrezepte für Abendessen
                if (recipe.childFriendly) return false;
                
                // Prüfe Kategorie-Ausschlüsse
                if (userPreferences.excludeCategories.length > 0) {
                    for (let category of recipe.categories || []) {
                        if (userPreferences.excludeCategories.includes(category)) {
                            return false;
                        }
                    }
                }
                
                // Prüfe spezifische Zutaten-Ausschlüsse
                if (userPreferences.excludeItems.length > 0) {
                    for (let item of userPreferences.excludeItems) {
                        for (let ingredient of recipe.excludeIngredients || []) {
                            if (ingredient.toLowerCase().includes(item.toLowerCase())) {
                                return false;
                            }
                        }
                    }
                }
                
                // Prüfe Küchenpräferenzen
                if (userPreferences.cuisines.length > 0) {
                    let hasCuisine = false;
                    for (let cuisine of userPreferences.cuisines) {
                        if (recipe.categories && recipe.categories.includes(cuisine)) {
                            hasCuisine = true;
                            break;
                        }
                    }
                    // Wenn keine passende Küche gefunden wurde und es keine vegetarischen Gerichte sind
                    if (!hasCuisine && !recipe.categories.includes('vegetarian')) {
                        return false;
                    }
                }
                
                return true;
            });
        }

            if (document.getElementById('excludeGluten').checked) {
                userPreferences.excludeCategories.push('gluten');
            }
            
            // Praktische Einstellungen
            userPreferences.preferQuick = document.getElementById('preferQuick').checked;
            userPreferences.extraPortions = document.getElementById('extraPortions').checked;
            userPreferences.budgetMode = document.getElementById('budgetMode').checked;
            userPreferences.simpleRecipes = document.getElementById('simpleRecipes').checked;
            
            // Speichere in localStorage (simuliert - in echter App würde dies persistiert)
            try {
                const prefsString = JSON.stringify(userPreferences);
                // localStorage würde hier verwendet werden
                console.log('Präferenzen gespeichert:', prefsString);
            } catch(e) {
                console.log('Speichern nicht möglich');
            }
        }

        function toggleVegetarian() {
            const isVeg = document.getElementById('vegetarian').checked;
            document.getElementById('excludeFish').checked = isVeg;
            document.getElementById('excludeMeat').checked = isVeg;
            document.getElementById('excludePoultry').checked = isVeg;
            savePreferences();
        }

        function addExclusion() {
            const input = document.getElementById('excludeInput');
            const value = input.value.trim();
            
            if (value && !userPreferences.excludeItems.includes(value)) {
                userPreferences.excludeItems.push(value);
                input.value = '';
                displayExcludedItems();
                savePreferences();
            }
        }

        function removeExclusion(item) {
            const index = userPreferences.excludeItems.indexOf(item);
            if (index > -1) {
                userPreferences.excludeItems.splice(index, 1);
                displayExcludedItems();
                savePreferences();
            }
        }

        function displayExcludedItems() {
            const container = document.getElementById('excludedItems');
            container.innerHTML = userPreferences.excludeItems.map(item => `
                <div class="excluded-item">
                    ${item}
                    <button onclick="removeExclusion('${item}')">×</button>
                </div>
            `).join('');
        }

        function resetPreferences() {
            userPreferences = {
                excludeCategories: [],
                excludeItems: [],
                preferQuick: false,
                extraPortions: false,
                budgetMode: false,
                simpleRecipes: false
            };
            
            // Reset checkboxes
            document.getElementById('excludeFish').checked = false;
            document.getElementById('excludeMeat').checked = false;
            document.getElementById('excludePoultry').checked = false;
            document.getElementById('excludeDairy').checked = false;
            document.getElementById('excludeGluten').checked = false;
            document.getElementById('vegetarian').checked = false;
            
            document.getElementById('preferQuick').checked = false;
            document.getElementById('extraPortions').checked = false;
            document.getElementById('budgetMode').checked = false;
            document.getElementById('simpleRecipes').checked = false;
            
            displayExcludedItems();
            savePreferences();
            showNotification('Präferenzen zurückgesetzt!', 'success');
        }

        function loadPreferences() {
            // In echter App würde hier aus localStorage geladen
            displayExcludedItems();
        }

        // Event Listener für Enter-Taste im Eingabefeld
        document.addEventListener('DOMContentLoaded', function() {
            const input = document.getElementById('excludeInput');
            if (input) {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        addExclusion();
                    }
                });
            }
        });

        // Entfernt: alte calculateShoppingList Funktion (nicht mehr benötigt)

        // Zeige den Essensplan an
        function displayMealPlan() {
            const container = document.getElementById('mealPlanContainer');
            container.innerHTML = '<h2 style="text-align: center; margin-bottom: 20px;">📅 Wochenplan</h2>';
            
            const planGrid = document.createElement('div');
            planGrid.className = 'meal-plan';

            Object.entries(mealPlan).forEach(([day, meals]) => {
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';
                
                let cardHTML = `<h3>${day}</h3>`;
                
                if (meals.dinner) {
                    cardHTML += `
                        <div class="meal">
                            <div class="meal-type">🌙 Abendessen</div>
                            <div class="meal-name">${meals.dinner.name}</div>
                            <div class="meal-details">${meals.dinner.servings}</div>
                            ${meals.dinner.recipe ? 
                                `<button onclick="showRecipe('${day}', 'dinner')" style="margin-top: 10px; padding: 5px 10px; font-size: 14px;">
                                    📖 Rezept anzeigen
                                </button>` : ''}
                        </div>
                    `;
                }
                
                if (meals.lunch) {
                    cardHTML += `
                        <div class="meal">
                            <div class="meal-type">☀️ Mittagessen</div>
                            <div class="meal-name">${meals.lunch.name}</div>
                            <div class="meal-details">${meals.lunch.servings}</div>
                            ${meals.lunch.recipe ? 
                                `<button onclick="showRecipe('${day}', 'lunch')" style="margin-top: 10px; padding: 5px 10px; font-size: 14px;">
                                    📖 Rezept anzeigen
                                </button>` : ''}
                        </div>
                    `;
                }
                
                dayCard.innerHTML = cardHTML;
                planGrid.appendChild(dayCard);
            });
            
            container.appendChild(planGrid);
        }

        // Zeige die Einkaufsliste an
        function displayShoppingList() {
            const container = document.getElementById('shoppingListContainer');
            container.innerHTML = '';
            
            const listDiv = document.createElement('div');
            listDiv.className = 'shopping-list';
            listDiv.innerHTML = '<h2>🛒 Einkaufsliste</h2>';
            
            let totalCost = 0;

            Object.entries(shoppingList).forEach(([store, items]) => {
                const storeSection = document.createElement('div');
                storeSection.className = 'store-section';
                
                let storeCost = 0;
                let itemsHTML = '<ul class="item-list">';
                
                items.forEach(item => {
                    let priceDisplay = `<span class="price">CHF ${item.price.toFixed(2)}</span>`;
                    
                    // Zeige Ersparnis wenn vorhanden
                    if (item.originalPrice) {
                        priceDisplay = `
                            <span style="text-decoration: line-through; color: #999;">CHF ${item.originalPrice.toFixed(2)}</span>
                            <span class="price">CHF ${item.price.toFixed(2)}</span>
                        `;
                    }
                    
                    if (item.savings) {
                        priceDisplay += ` <span style="color: #e53e3e; font-weight: bold;">${item.savings}</span>`;
                    }
                    
                    itemsHTML += `
                        <li>
                            <span>${item.name} (${item.unit})</span>
                            <span>${priceDisplay}</span>
                        </li>
                    `;
                    storeCost += item.price;
                });
                
                itemsHTML += '</ul>';
                
                storeSection.innerHTML = `
                    <div class="store-name">${store}</div>
                    ${itemsHTML}
                    <div style="text-align: right; margin-top: 10px; font-weight: 600;">
                        Zwischensumme: CHF ${storeCost.toFixed(2)}
                    </div>
                `;
                
                listDiv.appendChild(storeSection);
                totalCost += storeCost;
            });
            
            listDiv.innerHTML += `
                <div class="total-cost">
                    Gesamtkosten: CHF ${totalCost.toFixed(2)}
                </div>
            `;
            
            container.appendChild(listDiv);
        }

        // Zeige Rezept Modal
        function showRecipe(day, mealType) {
            const meal = mealPlan[day][mealType];
            if (!meal || !meal.recipe) return;
            
            const modal = document.getElementById('recipeModal');
            const details = document.getElementById('recipeDetails');
            
            // Prüfe ob es ein generiertes Rezept ist (hat totalCost)
            const isGenerated = meal.recipe.totalCost !== undefined;
            
            details.innerHTML = `
                <h3>${meal.name}</h3>
                <p><strong>⏱️ Zeit:</strong> ${meal.recipe.time}</p>
                <p><strong>📊 Schwierigkeit:</strong> ${meal.recipe.difficulty}</p>
                ${isGenerated ? `<p><strong>💰 Kosten:</strong> CHF ${meal.recipe.totalCost}</p>` : ''}
                
                <h4>📝 Zutaten:</h4>
                <ul>
                    ${meal.recipe.ingredients.map(ing => `<li>${ing}</li>`).join('')}
                </ul>
                
                <h4>👩‍🍳 Zubereitung:</h4>
                <ol>
                    ${meal.recipe.instructions.map(inst => `<li>${inst}</li>`).join('')}
                </ol>
                
                ${isGenerated ? '<p style="margin-top: 20px; font-style: italic; color: #666;">✨ Dieses Rezept wurde basierend auf aktuellen Angeboten generiert!</p>' : ''}
                ${meal.recipe.note ? `<p style="margin-top: 10px; color: #e53e3e;">${meal.recipe.note}</p>` : ''}
            `;
            
            modal.classList.add('active');
        }

        // Schließe Rezept Modal
        function closeRecipeModal() {
            document.getElementById('recipeModal').classList.remove('active');
        }

        // Exportiere den Plan
        function exportPlan() {
            if (Object.keys(mealPlan).length === 0) {
                showNotification('Bitte generieren Sie zuerst einen Essensplan!', 'error');
                return;
            }

            let exportText = 'WÖCHENTLICHER ESSENSPLAN\n';
            exportText += '========================\n\n';
            
            Object.entries(mealPlan).forEach(([day, meals]) => {
                exportText += `${day}:\n`;
                if (meals.dinner) {
                    exportText += `  Abendessen: ${meals.dinner.name} (${meals.dinner.servings})\n`;
                }
                if (meals.lunch) {
                    exportText += `  Mittagessen: ${meals.lunch.name} (${meals.lunch.servings})\n`;
                }
                exportText += '\n';
            });
            
            exportText += '\nEINKAUFSLISTE\n';
            exportText += '=============\n\n';
            
            Object.entries(shoppingList).forEach(([store, items]) => {
                exportText += `${store}:\n`;
                items.forEach(item => {
                    exportText += `  - ${item.name} (${item.unit}): CHF ${item.price.toFixed(2)}\n`;
                });
                exportText += '\n';
            });
            
            // Download als Textdatei
            const blob = new Blob([exportText], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Essensplan_${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            window.URL.revokeObjectURL(url);
            
            showNotification('Plan wurde exportiert!', 'success');
        }

        // PDF Export Funktion
        async function exportPDF() {
            if (Object.keys(mealPlan).length === 0) {
                showNotification('Bitte generieren Sie zuerst einen Essensplan!', 'error');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Titel
            doc.setFontSize(24);
            doc.setTextColor(102, 126, 234);
            doc.text('Wochenplan', 105, 20, { align: 'center' });
            
            // Datum
            doc.setFontSize(12);
            doc.setTextColor(100);
            const heute = new Date();
            const woche = getWeekNumber(heute);
            doc.text(`Kalenderwoche ${woche} - ${heute.toLocaleDateString('de-CH')}`, 105, 30, { align: 'center' });
            
            // Wochenplan
            doc.setTextColor(0);
            let yPos = 45;
            
            Object.entries(mealPlan).forEach(([day, meals]) => {
                // Tag
                doc.setFontSize(14);
                doc.setFont(undefined, 'bold');
                doc.text(day, 20, yPos);
                doc.setFont(undefined, 'normal');
                
                // Abendessen
                doc.setFontSize(11);
                doc.text(`Abendessen: ${meals.dinner.name}`, 30, yPos + 7);
                doc.setFontSize(9);
                doc.setTextColor(100);
                doc.text(meals.dinner.servings, 30, yPos + 12);
                
                // Zeige Kosten wenn vorhanden
                if (meals.dinner.recipe && meals.dinner.recipe.totalCost) {
                    doc.setTextColor(72, 187, 120);
                    doc.text(`CHF ${meals.dinner.recipe.totalCost}`, 150, yPos + 7);
                }
                
                // Mittagessen wenn vorhanden
                if (meals.lunch) {
                    doc.setTextColor(0);
                    doc.setFontSize(11);
                    doc.text(`Mittagessen: ${meals.lunch.name}`, 30, yPos + 19);
                    doc.setFontSize(9);
                    doc.setTextColor(100);
                    doc.text(meals.lunch.servings, 30, yPos + 24);
                    yPos += 35;
                } else {
                    yPos += 25;
                }
                
                doc.setTextColor(0);
                
                // Neue Seite wenn nötig
                if (yPos > 250) {
                    doc.addPage();
                    yPos = 20;
                }
            });
            
            // Neue Seite für Einkaufsliste
            doc.addPage();
            doc.setFontSize(20);
            doc.setTextColor(102, 126, 234);
            doc.text('Einkaufsliste', 105, 20, { align: 'center' });
            
            yPos = 35;
            let totalCost = 0;
            
            Object.entries(shoppingList).forEach(([store, items]) => {
                // Store Name
                doc.setFontSize(14);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(0);
                doc.text(store, 20, yPos);
                doc.setFont(undefined, 'normal');
                yPos += 8;
                
                let storeCost = 0;
                
                items.forEach(item => {
                    doc.setFontSize(10);
                    doc.text(`• ${item.name} (${item.unit})`, 25, yPos);
                    doc.text(`CHF ${item.price.toFixed(2)}`, 170, yPos, { align: 'right' });
                    
                    if (item.savings) {
                        doc.setTextColor(220, 38, 38);
                        doc.setFontSize(9);
                        doc.text(item.savings, 150, yPos);
                        doc.setTextColor(0);
                    }
                    
                    storeCost += item.price;
                    yPos += 6;
                });
                
                // Store Summe
                doc.setFontSize(11);
                doc.setFont(undefined, 'bold');
                doc.text(`Zwischensumme: CHF ${storeCost.toFixed(2)}`, 170, yPos + 2, { align: 'right' });
                doc.setFont(undefined, 'normal');
                
                totalCost += storeCost;
                yPos += 15;
                
                // Neue Seite wenn nötig
                if (yPos > 250) {
                    doc.addPage();
                    yPos = 20;
                }
            });
            
            // Gesamtsumme
            doc.setFontSize(14);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(102, 126, 234);
            doc.text(`Gesamtkosten: CHF ${totalCost.toFixed(2)}`, 105, yPos + 10, { align: 'center' });
            
            // PDF speichern
            const fileName = `Essensplan_KW${getWeekNumber(new Date())}_${new Date().toISOString().split('T')[0]}.pdf`;
            doc.save(fileName);
            
            showNotification('PDF wurde erfolgreich erstellt!', 'success');
        }

        // Hilfsfunktion für Kalenderwoche
        function getWeekNumber(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
        }

        // Zeige Benachrichtigungen
        function showNotification(message, type) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            
            if (type === 'success') {
                errorMessage.style.background = '#c6f6d5';
                errorMessage.style.color = '#22543d';
            } else if (type === 'error') {
                errorMessage.style.background = '#fed7d7';
                errorMessage.style.color = '#742a2a';
            } else {
                errorMessage.style.background = '#bee3f8';
                errorMessage.style.color = '#2c5282';
            }
            
            errorMessage.classList.add('active');
            
            setTimeout(() => {
                errorMessage.classList.remove('active');
            }, 3000);
        }

        // Initiale Nachricht
        window.addEventListener('load', function() {
            loadPreferences();
            showNotification('Klicken Sie auf "Aktuelle Angebote abrufen" um zu beginnen!', 'info');
        });
    </script>
