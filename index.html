<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 OCR Essensplaner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: rgba(255,255,255,0.95); border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #4a5568; margin-bottom: 20px; font-size: 2.5em; }
        .badge { display: inline-block; background: #48bb78; color: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; margin-bottom: 20px; }
        .controls { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        button { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .status { padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; }
        .status.success { background: #c6f6d5; color: #22543d; display: block; }
        .status.error { background: #fed7d7; color: #742a2a; display: block; }
        .status.info { background: #bee3f8; color: #2c5282; display: block; }
        .loading { display: none; text-align: center; padding: 40px; }
        .loading.active { display: block; }
        .spinner { width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .meal-plan { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .day-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .day-card h3 { color: #2d3748; margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .meal { margin-bottom: 15px; padding: 15px; background: #f7fafc; border-radius: 8px; border-left: 4px solid #667eea; }
        .meal-type { font-weight: 600; color: #4a5568; margin-bottom: 8px; font-size: 14px; }
        .meal-name { color: #2d3748; font-size: 16px; margin-bottom: 5px; }
        .meal-details { font-size: 14px; color: #718096; }
        .shopping-list { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .store-section { margin-bottom: 20px; padding: 15px; background: #f7fafc; border-radius: 8px; }
        .store-name { font-weight: 600; color: #4a5568; margin-bottom: 10px; font-size: 18px; }
        .item-list { list-style: none; padding: 0; }
        .item-list li { padding: 8px 0; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
        .price { color: #48bb78; font-weight: 600; }
        .total-cost { text-align: center; font-size: 20px; font-weight: 700; color: white; margin-top: 20px; padding: 15px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px; }
        .demo-notice { background: #fff3cd; border: 2px solid #ffc107; border-radius: 8px; padding: 15px; margin-bottom: 20px; text-align: center; color: #856404; }
        @media (max-width: 768px) { .container { padding: 15px; border-radius: 0; margin: 0; min-height: 100vh; } body { padding: 0; } .controls { flex-direction: column; } button { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 OCR Essensplaner</h1>
        <div style="text-align: center;">
            <span class="badge">🔍 Computer Vision + Tesseract OCR</span>
        </div>
        
        <div class="controls">
            <button onclick="fetchDeals()">🔄 Angebote laden</button>
            <button onclick="generateMealPlan()">📅 Plan erstellen</button>
            <button onclick="exportPDF()">📄 Als PDF</button>
            <button onclick="showSystemInfo()">ℹ️ System Info</button>
        </div>

        <div id="status"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>🤖 OCR analysiert Supermarkt-Websites...</p>
        </div>

        <div id="content"></div>
    </div>

    <script>
        let currentDeals = {};
        let currentPlan = {};
        let isDemo = false;

        // Demo-Daten basierend auf Ihren 6 OCR-Ergebnissen
        const demoData = {
            migros: [],
            coop: [
                { name: 'Schweizer Käse', price: 6.95, unit: '200g', category: 'Milchprodukte', store: 'Coop' },
                { name: 'Bio Joghurt', price: 2.45, unit: '500g', category: 'Milchprodukte', store: 'Coop' }
            ],
            aldi: [
                { name: 'Rindfleisch Steak', price: 12.90, unit: '400g', category: 'Fleisch', store: 'Aldi' },
                { name: 'Tomaten Cherry', price: 3.49, unit: '500g', category: 'Gemüse', store: 'Aldi' },
                { name: 'Vollkornbrot', price: 2.19, unit: '500g', category: 'Brot', store: 'Aldi' },
                { name: 'Bananen', price: 1.99, unit: '1kg', category: 'Obst', store: 'Aldi' }
            ],
            lidl: [],
            lastUpdate: new Date().toISOString(),
            method: 'OCR-Computer-Vision (6 Angebote erkannt)',
            note: 'Echte OCR-Daten von GitHub Actions'
        };

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.innerHTML = message;
            status.className = `status ${type}`;
            setTimeout(() => {
                if (type === 'success' || type === 'info') {
                    status.style.display = 'none';
                }
            }, 5000);
        }

        async function fetchDeals() {
            const loading = document.getElementById('loading');
            loading.classList.add('active');
            
            try {
                showStatus('🔄 Lade OCR-Angebote...', 'info');
                
                // Versuche echte Daten zu laden
                const response = await fetch('deals.json?' + new Date().getTime());
                
                if (response.ok) {
                    const data = await response.json();
                    const total = (data.migros?.length || 0) + (data.coop?.length || 0) + (data.aldi?.length || 0) + (data.lidl?.length || 0);
                    
                    if (total > 0) {
                        currentDeals = data;
                        isDemo = false;
                        const method = data.method || 'OCR';
                        const lastUpdate = new Date(data.lastUpdate).toLocaleDateString('de-CH');
                        showStatus(`✅ ${total} echte OCR-Angebote geladen! (${method})<br><small>Stand: ${lastUpdate}</small>`, 'success');
                    } else {
                        throw new Error('Keine Angebote in deals.json');
                    }
                } else {
                    throw new Error('deals.json nicht gefunden');
                }
                
            } catch (error) {
                // Fallback zu Demo-Daten
                currentDeals = demoData;
                isDemo = true;
                const total = 6; // 2 Coop + 4 Aldi
                showStatus(`⚠️ Keine Live-Daten verfügbar. Zeige Demo-Daten (${total} Angebote)<br><small>${error.message}</small>`, 'error');
            } finally {
                loading.classList.remove('active');
            }
        }

        function generateMealPlan() {
            if (Object.keys(currentDeals).length === 0) {
                showStatus('⚠️ Bitte zuerst Angebote laden!', 'error');
                return;
            }

            const days = ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag', 'Sonntag'];
            const allDeals = [];
            
            // Sammle alle Angebote
            Object.entries(currentDeals).forEach(([store, deals]) => {
                if (Array.isArray(deals)) {
                    deals.forEach(deal => allDeals.push({...deal, store}));
                }
            });

            if (allDeals.length < 3) {
                showStatus('⚠️ Zu wenige Angebote für Essensplan', 'error');
                return;
            }

            currentPlan = {};
            const shoppingList = {};

            // Generiere für jeden Tag ein Gericht
            days.forEach((day, index) => {
                const availableDeals = [...allDeals];
                const dinner = generateMeal(availableDeals, day);
                currentPlan[day] = { dinner };

                // Zur Einkaufsliste hinzufügen
                const store = dinner.store || 'Unbekannt';
                if (!shoppingList[store]) shoppingList[store] = [];
                if (!shoppingList[store].find(item => item.name === dinner.name)) {
                    shoppingList[store].push(dinner);
                }
            });

            displayPlan(currentPlan, shoppingList);
            const sourceText = isDemo ? 'Demo-Daten' : 'OCR-Angeboten';
            showStatus(`✅ Essensplan mit ${allDeals.length} ${sourceText} erstellt!`, 'success');
        }

        function generateMeal(deals, day) {
            const mealTemplates = [
                'Pasta mit {ingredient}',
                '{ingredient} mit Gemüse', 
                '{ingredient} Pfanne',
                'Gebratenes {ingredient}',
                '{ingredient} Auflauf',
                'Einfaches {ingredient} Gericht'
            ];
            
            // Wähle zufällige Zutat
            const ingredient = deals[Math.floor(Math.random() * Math.min(deals.length, 10))];
            const template = mealTemplates[Math.floor(Math.random() * mealTemplates.length)];
            
            return {
                name: template.replace('{ingredient}', ingredient.name),
                price: ingredient.price || Math.random() * 10 + 3,
                store: ingredient.store,
                category: ingredient.category || 'Sonstiges',
                servings: '4 Portionen',
                unit: ingredient.unit || 'Portion'
            };
        }

        function displayPlan(plan, shoppingList) {
            const content = document.getElementById('content');
            
            if (isDemo) {
                content.innerHTML = '<div class="demo-notice">📝 <strong>Demo-Modus:</strong> Verwendet Beispiel-Daten. Für echte Angebote aktivieren Sie GitHub Pages und führen die GitHub Action aus.</div>';
            } else {
                content.innerHTML = '';
            }
            
            let html = '<h2 style="text-align: center; margin-bottom: 20px;">📅 Wochenplan</h2>';
            
            // Essensplan
            html += '<div class="meal-plan">';
            Object.entries(plan).forEach(([day, meals]) => {
                html += `
                    <div class="day-card">
                        <h3>${day}</h3>
                        <div class="meal">
                            <div class="meal-type">🌙 Abendessen</div>
                            <div class="meal-name">${meals.dinner.name}</div>
                            <div class="meal-details">${meals.dinner.servings} - CHF ${meals.dinner.price?.toFixed(2) || '0.00'}</div>
                            <div class="meal-details">📍 ${meals.dinner.store}</div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            // Einkaufsliste
            html += '<div class="shopping-list"><h2>🛒 Einkaufsliste</h2>';
            
            let totalCost = 0;
            const storeEmojis = { 'Migros': '🟠', 'Coop': '🔴', 'Aldi': '🔵', 'Lidl': '🟢' };
            
            Object.entries(shoppingList).forEach(([store, items]) => {
                let storeCost = 0;
                html += `<div class="store-section">
                    <div class="store-name">${storeEmojis[store] || '🏪'} ${store}</div>
                    <ul class="item-list">`;
                
                items.forEach(item => {
                    const price = item.price || 0;
                    storeCost += price;
                    html += `<li>
                        <span>${item.name} (${item.unit || 'Stück'})</span>
                        <span class="price">CHF ${price.toFixed(2)}</span>
                    </li>`;
                });
                
                html += `</ul>
                    <div style="text-align: right; margin-top: 10px; font-weight: 600;">
                        Zwischensumme: CHF ${storeCost.toFixed(2)}
                    </div>
                </div>`;
                
                totalCost += storeCost;
            });
            
            html += `<div class="total-cost">
                💰 Gesamtkosten: CHF ${totalCost.toFixed(2)}
                <div style="font-size: 14px; margin-top: 5px; opacity: 0.9;">
                    🤖 ${isDemo ? 'Demo-Berechnung' : 'OCR-basierte Kalkulation'}
                </div>
            </div></div>`;
            
            content.innerHTML += html;
        }

        function exportPDF() {
            if (Object.keys(currentPlan).length === 0) {
                showStatus('⚠️ Bitte zuerst Essensplan erstellen!', 'error');
                return;
            }

            let exportText = 'OCR ESSENSPLANER\n================\n\n';
            exportText += `Erstellt: ${new Date().toLocaleDateString('de-CH')}\n`;
            exportText += `Modus: ${isDemo ? 'Demo-Daten' : 'OCR-Computer-Vision'}\n\n`;
            
            Object.entries(currentPlan).forEach(([day, meals]) => {
                exportText += `${day}:\n`;
                exportText += `  Abendessen: ${meals.dinner.name}\n`;
                exportText += `  Preis: CHF ${meals.dinner.price?.toFixed(2) || '0.00'}\n`;
                exportText += `  Store: ${meals.dinner.store}\n\n`;
            });

            const blob = new Blob([exportText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `OCR-Essensplan-${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            
            showStatus('✅ Plan als Textdatei exportiert!', 'success');
        }

        function showSystemInfo() {
            const infoText = `
🤖 OCR-Essensplaner System

📊 Status: ${isDemo ? 'Demo-Modus' : 'Live OCR-Daten'}
🔍 OCR-Engine: Tesseract.js
🌐 Method: Computer Vision
📅 Letzte Ausführung: ${currentDeals.lastUpdate ? new Date(currentDeals.lastUpdate).toLocaleString('de-CH') : 'Unbekannt'}

🏪 Unterstützte Supermärkte:
🟠 Migros: ${currentDeals.migros?.length || 0} Angebote
🔴 Coop: ${currentDeals.coop?.length || 0} Angebote  
🔵 Aldi: ${currentDeals.aldi?.length || 0} Angebote
🟢 Lidl: ${currentDeals.lidl?.length || 0} Angebote

🔧 Für echte Daten:
1. GitHub Pages aktivieren
2. GitHub Action ausführen
3. Seite neu laden

✨ Aktuelle Erkennungsrate: 6/4 Stores erfolgreich
            `;
            
            alert(infoText);
        }

        // Auto-Load beim Start
        window.addEventListener('load', () => {
            showStatus('🤖 OCR-Essensplaner geladen! Klicken Sie "Angebote laden" um zu starten.', 'info');
            
            // Automatischer Versuch echte Daten zu laden
            setTimeout(() => {
                fetchDeals();
            }, 1000);
        });
    </script>
</body>
</html>
