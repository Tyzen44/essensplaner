<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 OCR Essensplaner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: rgba(255,255,255,0.95); border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #4a5568; margin-bottom: 20px; font-size: 2.5em; }
        .badge { display: inline-block; background: #48bb78; color: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; margin-bottom: 20px; }
        .controls { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        button { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .status { padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; }
        .status.success { background: #c6f6d5; color: #22543d; display: block; }
        .status.error { background: #fed7d7; color: #742a2a; display: block; }
        .status.info { background: #bee3f8; color: #2c5282; display: block; }
        .loading { display: none; text-align: center; padding: 40px; }
        .loading.active { display: block; }
        .spinner { width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .meal-plan { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .day-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .day-card h3 { color: #2d3748; margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .meal { margin-bottom: 15px; padding: 15px; background: #f7fafc; border-radius: 8px; border-left: 4px solid #667eea; }
        .meal-type { font-weight: 600; color: #4a5568; margin-bottom: 8px; font-size: 14px; }
        .meal-name { color: #2d3748; font-size: 16px; margin-bottom: 5px; }
        .meal-details { font-size: 14px; color: #718096; }
        .shopping-list { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .store-section { margin-bottom: 20px; padding: 15px; background: #f7fafc; border-radius: 8px; }
        .store-name { font-weight: 600; color: #4a5568; margin-bottom: 10px; font-size: 18px; }
        .item-list { list-style: none; padding: 0; }
        .item-list li { padding: 8px 0; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
        .price { color: #48bb78; font-weight: 600; }
        .total-cost { text-align: center; font-size: 20px; font-weight: 700; color: white; margin-top: 20px; padding: 15px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px; }
        @media (max-width: 768px) { .container { padding: 15px; border-radius: 0; margin: 0; min-height: 100vh; } body { padding: 0; } .controls { flex-direction: column; } button { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 OCR Essensplaner</h1>
        <div style="text-align: center;">
            <span class="badge">🔍 Computer Vision + Tesseract OCR</span>
        </div>
        
        <div class="controls">
            <button onclick="fetchDeals()">🔄 Angebote laden</button>
            <button onclick="generateMealPlan()">📅 Plan erstellen</button>
            <button onclick="exportPDF()">📄 Als PDF</button>
            <button onclick="showSystemInfo()">ℹ️ System Info</button>
        </div>

        <div id="status"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>🤖 OCR analysiert Supermarkt-Websites...</p>
        </div>

        <div id="content"></div>
    </div>

    <script>
        let currentDeals = {};
        let currentPlan = {};

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.innerHTML = message;
            status.className = 'status ' + type;
            setTimeout(() => status.style.display = 'none', 5000);
        }

        async function fetchDeals() {
            const loading = document.getElementById('loading');
            loading.classList.add('active');
            
            try {
                const response = await fetch('deals.json?' + new Date().getTime());
                
                if (!response.ok) {
                    throw new Error('deals.json nicht gefunden');
                }
                
                const data = await response.json();
                currentDeals = data;
                
                const total = (data.migros?.length || 0) + (data.coop?.length || 0) + (data.aldi?.length || 0) + (data.lidl?.length || 0);
                
                if (total === 0) {
                    showStatus('⚠️ Keine Angebote gefunden. GitHub Action ausführen!', 'error');
                } else {
                    const method = data.method || 'OCR';
                    const lastUpdate = new Date(data.lastUpdate).toLocaleDateString('de-CH');
                    showStatus('✅ ' + total + ' Angebote geladen (' + method + ')<br><small>Stand: ' + lastUpdate + '</small>', 'success');
                }
                
            } catch (error) {
                showStatus('❌ Fehler: ' + error.message, 'error');
            } finally {
                loading.classList.remove('active');
            }
        }

        function generateMealPlan() {
            if (!currentDeals.migros && !currentDeals.coop && !currentDeals.aldi && !currentDeals.lidl) {
                showStatus('⚠️ Bitte zuerst Angebote laden!', 'error');
                return;
            }

            const days = ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag', 'Sonntag'];
            const allDeals = [];
            
            Object.entries(currentDeals).forEach(([store, deals]) => {
                if (Array.isArray(deals)) {
                    deals.forEach(deal => allDeals.push({...deal, store}));
                }
            });

            if (allDeals.length < 3) {
                showStatus('⚠️ Zu wenige Angebote für Essensplan', 'error');
                return;
            }

            currentPlan = {};
            const shoppingList = {};

            days.forEach(day => {
                const dayDeals = [...allDeals].sort(() => Math.random() - 0.5);
                const dinner = generateMeal(dayDeals);
                currentPlan[day] = { dinner };

                if (!shoppingList[dinner.store]) shoppingList[dinner.store] = [];
                if (!shoppingList[dinner.store].find(item => item.name === dinner.name)) {
                    shoppingList[dinner.store].push(dinner);
                }
            });

            displayPlan(currentPlan, shoppingList);
            showStatus('✅ Essensplan mit ' + allDeals.length + ' Angeboten erstellt!', 'success');
        }

        function generateMeal(deals) {
            const templates = [
                'Pasta mit {ingredient}',
                '{ingredient} mit Beilage', 
                '{ingredient} Pfanne',
                'Gebratenes {ingredient}',
                'Einfaches {ingredient} Gericht'
            ];
            
            const ingredient = deals[Math.floor(Math.random() * Math.min(deals.length, 10))];
            const template = templates[Math.floor(Math.random() * templates.length)];
            
            return {
                name: template.replace('{ingredient}', ingredient.name),
                price: ingredient.price || 0,
                store: ingredient.store,
                category: ingredient.category || 'Sonstiges',
                servings: '4 Portionen'
            };
        }

        function displayPlan(plan, shoppingList) {
            const content = document.getElementById('content');
            let html = '<h2 style="text-align: center; margin-bottom: 20px;">📅 Wochenplan</h2>';
            
            html += '<div class="meal-plan">';
            Object.entries(plan).forEach(([day, meals]) => {
                html += '<div class="day-card"><h3>' + day + '</h3>';
                html += '<div class="meal">';
                html += '<div class="meal-type">🌙 Abendessen</div>';
                html += '<div class="meal-name">' + meals.dinner.name + '</div>';
                html += '<div class="meal-details">' + meals.dinner.servings + ' - CHF ' + (meals.dinner.price?.toFixed(2) || '0.00') + '</div>';
                html += '<div class="meal-details">📍 ' + meals.dinner.store + '</div>';
                html += '</div></div>';
            });
            html += '</div>';

            html += '<div class="shopping-list"><h2>🛒 Einkaufsliste</h2>';
            
            let totalCost = 0;
            const storeEmojis = { 'migros': '🟠', 'coop': '🔴', 'aldi': '🔵', 'lidl': '🟢' };
            
            Object.entries(shoppingList).forEach(([store, items]) => {
                let storeCost = 0;
                html += '<div class="store-section">';
                html += '<div class="store-name">' + (storeEmojis[store.toLowerCase()] || '🏪') + ' ' + store + '</div>';
                html += '<ul class="item-list">';
                
                items.forEach(item => {
                    const price = item.price || 0;
                    storeCost += price;
                    html += '<li><span>' + item.name + '</span><span class="price">CHF ' + price.toFixed(2) + '</span></li>';
                });
                
                html += '</ul>';
                html += '<div style="text-align: right; margin-top: 10px; font-weight: 600;">Zwischensumme: CHF ' + storeCost.toFixed(2) + '</div>';
                html += '</div>';
                
                totalCost += storeCost;
            });
            
            html += '<div class="total-cost">💰 Gesamtkosten: CHF ' + totalCost.toFixed(2) + '<div style="font-size: 14px; margin-top: 5px; opacity: 0.9;">🤖 OCR-basierte Kalkulation</div></div>';
            html += '</div>';
            
            content.innerHTML = html;
        }

        function exportPDF() {
            if (Object.keys(currentPlan).length === 0) {
                showStatus('⚠️ Bitte zuerst Essensplan erstellen!', 'error');
                return;
            }

            let exportText = 'OCR ESSENSPLANER\\n================\\n\\n';
            exportText += 'Erstellt: ' + new Date().toLocaleDateString('de-CH') + '\\n\\n';
            
            Object.entries(currentPlan).forEach(([day, meals]) => {
                exportText += day + ':\\n';
                exportText += '  Abendessen: ' + meals.dinner.name + '\\n';
                exportText += '  Preis: CHF ' + (meals.dinner.price?.toFixed(2) || '0.00') + '\\n';
                exportText += '  Store: ' + meals.dinner.store + '\\n\\n';
            });

            const blob = new Blob([exportText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'OCR-Essensplan-' + new Date().toISOString().split('T')[0] + '.txt';
            a.click();
            URL.revokeObjectURL(url);
            
            showStatus('✅ Plan als Textdatei exportiert!', 'success');
        }

        function showSystemInfo() {
            const totalDeals = Object.values(currentDeals).reduce((sum, deals) => {
                return sum + (Array.isArray(deals) ? deals.length : 0);
            }, 0);
            
            alert('🤖 OCR-Essensplaner System Info\\n\\n' +
                  '📊 Status: ' + (totalDeals > 0 ? 'Live OCR-Daten' : 'Keine Daten') + '\\n' +
                  '🔍 OCR-Engine: Tesseract.js\\n' +
                  '🌐 Methode: Computer Vision\\n\\n' +
                  '🏪 Erkannte Angebote:\\n' +
                  '🟠 Migros: ' + (currentDeals.migros?.length || 0) + '\\n' +
                  '🔴 Coop: ' + (currentDeals.coop?.length || 0) + '\\n' +  
                  '🔵 Aldi: ' + (currentDeals.aldi?.length || 0) + '\\n' +
                  '🟢 Lidl: ' + (currentDeals.lidl?.length || 0) + '\\n\\n' +
                  '📈 Gesamt: ' + totalDeals + ' Angebote\\n\\n' +
                  '✨ System funktioniert!');
        }

        window.addEventListener('load', () => {
            showStatus('🤖 OCR-Essensplaner geladen! Klicken Sie "Angebote laden" um zu starten.', 'info');
            setTimeout(() => {
                fetchDeals();
            }, 1000);
        });
    </script>
</body>
</html>
