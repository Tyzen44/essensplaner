    <title>Wöchentlicher Essensplaner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #4a5568;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .meal-plan {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .day-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .day-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .day-card h3 {
            color: #2d3748;
            margin-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .meal {
            margin-bottom: 15px;
            padding: 10px;
            background: #f7fafc;
            border-radius: 8px;
        }

        .meal-type {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 5px;
        }

        .meal-name {
            color: #2d3748;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .meal-details {
            font-size: 14px;
            color: #718096;
        }

        .shopping-list {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .shopping-list h2 {
            color: #2d3748;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .store-section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 8px;
        }

        .store-name {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .item-list {
            list-style: none;
            padding-left: 0;
        }

        .item-list li {
            padding: 5px 0;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-list li:last-child {
            border-bottom: none;
        }

        .price {
            color: #48bb78;
            font-weight: 600;
        }

        .total-cost {
            text-align: right;
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
        }

        .recipe-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .recipe-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .recipe-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #e2e8f0;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .recipe-content h3 {
            color: #2d3748;
            margin-bottom: 20px;
        }

        .recipe-content h4 {
            color: #4a5568;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .recipe-content ul, .recipe-content ol {
            padding-left: 20px;
            line-height: 1.8;
        }

        .error-message {
            display: none;
            background: #fed7d7;
            color: #742a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .error-message.active {
            display: block;
        }

        .preferences-panel {
            display: none;
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            animation: slideDown 0.3s ease-out;
        }

        .preferences-panel.active {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .preferences-panel h3 {
            color: #2d3748;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .preference-section {
            margin-bottom: 25px;
        }

        .preference-section h4 {
            color: #4a5568;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .category-filters, .cuisine-preferences {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: #f7fafc;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .checkbox-label:hover {
            background: #edf2f7;
        }

        .checkbox-label input {
            margin-right: 8px;
            cursor: pointer;
        }

        .checkbox-label span {
            font-size: 14px;
            color: #2d3748;
        }

        .exclusion-list {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .exclusion-list input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
        }

        .exclusion-list input:focus {
            outline: none;
            border-color: #667eea;
        }

        .excluded-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .excluded-item {
            background: #fed7d7;
            color: #742a2a;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .excluded-item button {
            background: none;
            border: none;
            color: #742a2a;
            cursor: pointer;
            padding: 0;
            margin: 0;
            font-size: 18px;
            line-height: 1;
        }

        .preference-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
                border-radius: 0;
                min-height: 100vh;
            }

            body {
                padding: 0;
            }

            h1 {
                font-size: 1.8em;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            button {
                width: 100%;
                padding: 15px;
                font-size: 17px;
            }

            .meal-plan {
                grid-template-columns: 1fr;
            }

            .preferences-panel {
                border-radius: 0;
                margin: 0 -15px;
                padding: 20px 15px;
            }

            .category-filters, .cuisine-preferences {
                grid-template-columns: 1fr;
            }

            .recipe-content {
                width: 95%;
                margin: 20px auto;
            }
        }

        /* iOS-spezifische Anpassungen */
        @supports (-webkit-touch-callout: none) {
            .container {
                padding-bottom: env(safe-area-inset-bottom);
            }
            
            button {
                -webkit-tap-highlight-color: transparent;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ Wöchentlicher Essensplaner</h1>
        
        <div class="controls">
            <button onclick="fetchDeals()">🔄 Aktuelle Angebote abrufen</button>
            <button onclick="generateMealPlan()">📅 Essensplan generieren</button>
            <button onclick="togglePreferences()">⚙️ Präferenzen</button>
            <button onclick="exportPlan()">📄 Plan exportieren</button>
        </div>

        <div class="preferences-panel" id="preferencesPanel">
            <h3>🍽️ Ihre Präferenzen</h3>
            
            <div class="preference-section">
                <h4>Kategorien ausschließen:</h4>
                <div class="category-filters">
                    <label class="checkbox-label">
                        <input type="checkbox" id="excludeFish" onchange="savePreferences()">
                        <span>🐟 Kein Fisch</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="excludeMeat" onchange="savePreferences()">
                        <span>🥩 Kein Fleisch</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="excludePoultry" onchange="savePreferences()">
                        <span>🍗 Kein Geflügel</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="excludeDairy" onchange="savePreferences()">
                        <span>🥛 Keine Milchprodukte</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="excludeGluten" onchange="savePreferences()">
                        <span>🌾 Glutenfrei</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="vegetarian" onchange="toggleVegetarian()">
                        <span>🥗 Vegetarisch</span>
                    </label>
                </div>
            </div>

            <div class="preference-section">
                <h4>Spezifische Lebensmittel ausschließen:</h4>
                <div class="exclusion-list">
                    <input type="text" id="excludeInput" placeholder="z.B. Brokkoli, Zwiebeln...">
                    <button onclick="addExclusion()">➕ Hinzufügen</button>
                </div>
                <div id="excludedItems" class="excluded-items"></div>
            </div>

            <div class="preference-section">
                <h4>Präferierte Küchen:</h4>
                <div class="cuisine-preferences">
                    <label class="checkbox-label">
                        <input type="checkbox" id="italian" checked onchange="savePreferences()">
                        <span>🇮🇹 Italienisch</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="asian" checked onchange="savePreferences()">
                        <span>🥢 Asiatisch</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="swiss" checked onchange="savePreferences()">
                        <span>🇨🇭 Schweizer Küche</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="mediterranean" checked onchange="savePreferences()">
                        <span>🫒 Mediterran</span>
                    </label>
                </div>
            </div>

            <div class="preference-actions">
                <button onclick="resetPreferences()">🔄 Zurücksetzen</button>
                <button onclick="togglePreferences()" style="background: #48bb78;">✓ Fertig</button>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Suche nach aktuellen Angeboten...</p>
        </div>

        <div id="mealPlanContainer"></div>
        <div id="shoppingListContainer"></div>
    </div>

    <div class="recipe-modal" id="recipeModal">
        <div class="recipe-content">
            <button class="close-modal" onclick="closeRecipeModal()">×</button>
            <div id="recipeDetails"></div>
        </div>
    </div>

    <script>
        // Service Worker Registration für Offline-Funktionalität
        if ('serviceWorker' in navigator) {
            // Erstelle Service Worker als Blob
            const swCode = `
                self.addEventListener('install', e => {
                    e.waitUntil(
                        caches.open('essensplaner-v1').then(cache => {
                            return cache.addAll(['/']);
                        })
                    );
                });

                self.addEventListener('fetch', e => {
                    e.respondWith(
                        caches.match(e.request).then(response => {
                            return response || fetch(e.request);
                        })
                    );
                });
            `;
            
            // Registriere Service Worker nur wenn online gehostet
            if (window.location.protocol === 'https:' || window.location.hostname === 'localhost') {
                // Service Worker würde hier registriert werden
                console.log('PWA-Modus verfügbar');

        }

        // Globale Variablen
        let currentDeals = {};

        const recipes = {

        // Funktion zum Abrufen der Angebote
        async function fetchDeals() {
            const loading = document.getElementById('loading');
            const errorMessage = document.getElementById('errorMessage');
            
            loading.classList.add('active');
            errorMessage.classList.remove('active');
            
            try {
                // Simuliere API-Aufruf mit Verzögerung
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                // In der Realität würden hier die Webseiten gescraped werden
                currentDeals = simulatedDeals;
                
                loading.classList.remove('active');
                showNotification('Angebote erfolgreich geladen!', 'success');
                
            } catch (error) {
                loading.classList.remove('active');
                errorMessage.textContent = 'Fehler beim Laden der Angebote. Bitte versuchen Sie es später erneut.';
                errorMessage.classList.add('active');
            }
        }

        // Funktion zum Generieren des Essensplans
        function generateMealPlan() {
            if (Object.keys(currentDeals).length === 0) {
                showNotification('Bitte laden Sie zuerst die aktuellen Angebote!', 'error');
                return;
            }

            const days = ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag', 'Sonntag'];
            
            // Filtere verfügbare Rezepte basierend auf Präferenzen
            const availableRecipes = filterRecipesByPreferences();
            
            if (availableRecipes.length < 3) {
                showNotification('Zu viele Einschränkungen! Bitte lockern Sie Ihre Präferenzen.', 'error');
                return;
            }

            const lunchMeals = ['Kinderfreundliche Nudeln', 'Mini-Pizzas'];

            mealPlan = {};
            shoppingList = {};

            // Plane Abendessen für alle Tage
            days.forEach((day, index) => {
                const recipeIndex = index % availableRecipes.length;
                mealPlan[day] = {
                    dinner: {
                        name: availableRecipes[recipeIndex],
                        servings: '2 Erwachsene + 2 Kinder',
                        recipe: recipes[availableRecipes[recipeIndex]]
                    }
                };

                // Füge Mittagessen für Dienstag und Donnerstag hinzu
                if (day === 'Dienstag' || day === 'Donnerstag') {
                    mealPlan[day].lunch = {
                        name: lunchMeals[day === 'Dienstag' ? 0 : 1],
                        servings: '2 Kinder (2 Jahre)',
                        recipe: recipes[lunchMeals[day === 'Dienstag' ? 0 : 1]] || null
                    };
                }
            });

            // Erstelle Einkaufsliste basierend auf Rezepten und Angeboten
            calculateShoppingList();
            
            // Zeige den Plan an
            displayMealPlan();
            displayShoppingList();
            
            showNotification('Essensplan wurde erfolgreich generiert!', 'success');
        }

        // Filtere Rezepte basierend auf Benutzerpräferenzen
        function filterRecipesByPreferences() {
            return Object.keys(recipes).filter(recipeName => {
                const recipe = recipes[recipeName];
                
                // Überspringe Kinderrezepte für Abendessen
                if (recipe.childFriendly) return false;
                
                // Prüfe Kategorie-Ausschlüsse
                if (userPreferences.excludeCategories.length > 0) {
                    for (let category of recipe.categories || []) {
                        if (userPreferences.excludeCategories.includes(category)) {
                            return false;
                        }
                    }
                }
                
                // Prüfe spezifische Zutaten-Ausschlüsse
                if (userPreferences.excludeItems.length > 0) {
                    for (let item of userPreferences.excludeItems) {
                        for (let ingredient of recipe.excludeIngredients || []) {
                            if (ingredient.toLowerCase().includes(item.toLowerCase())) {
                                return false;
                            }
                        }
                    }
                }
                
                // Prüfe Küchenpräferenzen
                if (userPreferences.cuisines.length > 0) {
                    let hasCuisine = false;
                    for (let cuisine of userPreferences.cuisines) {
                        if (recipe.categories && recipe.categories.includes(cuisine)) {
                            hasCuisine = true;
                            break;
                        }
                    }
                    // Wenn keine passende Küche gefunden wurde und es keine vegetarischen Gerichte sind
                    if (!hasCuisine && !recipe.categories.includes('vegetarian')) {
                        return false;
                    }
                }
                
                return true;
            });
        }

            }
            if (document.getElementById('excludePoultry').checked) {

            }
            if (document.getElementById('excludeGluten').checked) {

            userPreferences.cuisines = [];

            }

                userPreferences.cuisines.push('asian');

        function addExclusion() {
            const input = document.getElementById('excludeInput');
            const value = input.value.trim();
            
            if (value && !userPreferences.excludeItems.includes(value)) {
                userPreferences.excludeItems.push(value);
                input.value = '';
                displayExcludedItems();
                savePreferences();
            }
        }

        function removeExclusion(item) {
            const index = userPreferences.excludeItems.indexOf(item);
            if (index > -1) {
                userPreferences.excludeItems.splice(index, 1);
                displayExcludedItems();
                savePreferences();
            }
        }

            const container = document.getElementById('excludedItems');
            container.innerHTML = userPreferences.excludeItems.map(item => `

        // Event Listener für Enter-Taste im Eingabefeld
        document.addEventListener('DOMContentLoaded', function() {

        // Berechne die Einkaufsliste
        function calculateShoppingList() {
            // Sammle alle benötigten Zutaten
            const neededIngredients = {};

            Object.values(mealPlan).forEach(day => {
                ['dinner', 'lunch'].forEach(mealType => {
                    if (day[mealType] && day[mealType].recipe) {
                        day[mealType].recipe.ingredients.forEach(ingredient => {
                            // Vereinfachte Zutatenerkennung
                            const match = ingredient.match(/(\d+)(g|kg|L|ml|Stück)?\s+(.+)/);
                            if (match) {
                                const amount = parseInt(match[1]);
                                const unit = match[2] || '';
                                const name = match[3];
                                
                                if (!neededIngredients[name]) {
                                    neededIngredients[name] = { amount: 0, unit: unit };
                                }
                                neededIngredients[name].amount += amount;
                            }
                        });
                    }
                });
            });

            // Finde beste Angebote für jede Zutat
            Object.entries(neededIngredients).forEach(([ingredient, details]) => {
                let bestDeal = null;
                let bestStore = null;
                let bestPrice = Infinity;

                Object.entries(currentDeals).forEach(([store, deals]) => {
                    deals.forEach(deal => {
                        if (deal.name.toLowerCase().includes(ingredient.toLowerCase()) ||
                            ingredient.toLowerCase().includes(deal.name.toLowerCase())) {
                            if (deal.price < bestPrice) {
                                bestPrice = deal.price;
                                bestDeal = deal;
                                bestStore = store;
                            }
                        }
                    });
                });

                if (bestDeal) {
                    if (!shoppingList[bestStore]) {
                        shoppingList[bestStore] = [];
                    }
                    shoppingList[bestStore].push({
                        ...bestDeal,
                        needed: `${details.amount}${details.unit}`
                    });
                }
            });
        }

            planGrid.className = 'meal-plan';

            Object.entries(mealPlan).forEach(([day, meals]) => {
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';
                
                let cardHTML = `<h3>${day}</h3>`;

                    cardHTML += `

                            <div class="meal-name">${meals.dinner.name}</div>
                            <div class="meal-details">${meals.dinner.servings}</div>
                            ${meals.dinner.recipe ? 
                                `<button onclick="showRecipe('${day}', 'dinner')" style="margin-top: 10px; padding: 5px 10px; font-size: 14px;">
                                    📖 Rezept anzeigen
                                </button>` : ''}
                        </div>
                    `;
                }
                
                if (meals.lunch) {
                    cardHTML += `
                        <div class="meal">
                            <div class="meal-type">☀️ Mittagessen</div>
                            <div class="meal-name">${meals.lunch.name}</div>
                            <div class="meal-details">${meals.lunch.servings}</div>
                            ${meals.lunch.recipe ? 
                                `<button onclick="showRecipe('${day}', 'lunch')" style="margin-top: 10px; padding: 5px 10px; font-size: 14px;">
                                    📖 Rezept anzeigen
                                </button>` : ''}

                dayCard.innerHTML = cardHTML;
                planGrid.appendChild(dayCard);
            });
            
            container.appendChild(planGrid);
        }

        // Zeige die Einkaufsliste an
        function displayShoppingList() {
            const container = document.getElementById('shoppingListContainer');
            container.innerHTML = '';
            
            const listDiv = document.createElement('div');
            listDiv.className = 'shopping-list';
            listDiv.innerHTML = '<h2>🛒 Einkaufsliste</h2>';
            
            let totalCost = 0;

            Object.entries(shoppingList).forEach(([store, items]) => {
                const storeSection = document.createElement('div');
                storeSection.className = 'store-section';
                
                let storeCost = 0;
                let itemsHTML = '<ul class="item-list">';
                
                items.forEach(item => {
                    itemsHTML += `
                        <li>
                            <span>${item.name} (${item.unit})</span>
                            <span class="price">CHF ${item.price.toFixed(2)}</span>
                        </li>
                    `;
                    storeCost += item.price;
                });
                
                itemsHTML += '</ul>';
                
                storeSection.innerHTML = `
                    <div class="store-name">${store}</div>
                    ${itemsHTML}
                    <div style="text-align: right; margin-top: 10px; font-weight: 600;">
                        Zwischensumme: CHF ${storeCost.toFixed(2)}
                    </div>
                `;
                
                listDiv.appendChild(storeSection);
                totalCost += storeCost;
            });
            
            listDiv.innerHTML += `
                <div class="total-cost">
                    Gesamtkosten: CHF ${totalCost.toFixed(2)}
                </div>
            `;
            
            container.appendChild(listDiv);
        }

        // Zeige Rezept Modal
        function showRecipe(day, mealType) {
            const meal = mealPlan[day][mealType];
            if (!meal || !meal.recipe) return;
            
            const modal = document.getElementById('recipeModal');
            const details = document.getElementById('recipeDetails');
            
            details.innerHTML = `
                <h3>${meal.name}</h3>
                <p><strong>⏱️ Zeit:</strong> ${meal.recipe.time}</p>
                <p><strong>📊 Schwierigkeit:</strong> ${meal.recipe.difficulty}</p>
                
                <h4>📝 Zutaten:</h4>
                <ul>
                    ${meal.recipe.ingredients.map(ing => `<li>${ing}</li>`).join('')}
                </ul>
                
                <h4>👩‍🍳 Zubereitung:</h4>
                <ol>
                    ${meal.recipe.instructions.map(inst => `<li>${inst}</li>`).join('')}
                </ol>
            `;
            
            modal.classList.add('active');
        }

        // Exportiere den Plan
        function exportPlan() {
            if (Object.keys(mealPlan).length === 0) {
                showNotification('Bitte generieren Sie zuerst einen Essensplan!', 'error');
                return;
            }

            let exportText = 'WÖCHENTLICHER ESSENSPLAN\n';
            exportText += '========================\n\n';
            
            Object.entries(mealPlan).forEach(([day, meals]) => {
                exportText += `${day}:\n`;
                if (meals.dinner) {
                    exportText += `  Abendessen: ${meals.dinner.name} (${meals.dinner.servings})\n`;
                }
                if (meals.lunch) {
                    exportText += `  Mittagessen: ${meals.lunch.name} (${meals.lunch.servings})\n`;
                }
                exportText += '\n';
            });
            
            exportText += '\nEINKAUFSLISTE\n';
            exportText += '=============\n\n';
            
            Object.entries(shoppingList).forEach(([store, items]) => {
                exportText += `${store}:\n`;
                items.forEach(item => {
                    exportText += `  - ${item.name} (${item.unit}): CHF ${item.price.toFixed(2)}\n`;
                });
                exportText += '\n';
            });
            
            // Download als Textdatei
            const blob = new Blob([exportText], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Essensplan_${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            window.URL.revokeObjectURL(url);
            
            showNotification('Plan wurde exportiert!', 'success');
        }

        // Zeige Benachrichtigungen
        function showNotification(message, type) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            
            if (type === 'success') {
                errorMessage.style.background = '#c6f6d5';
                errorMessage.style.color = '#22543d';
            } else if (type === 'error') {
                errorMessage.style.background = '#fed7d7';
                errorMessage.style.color = '#742a2a';
            } else {
                errorMessage.style.background = '#bee3f8';
                errorMessage.style.color = '#2c5282';
            }
            
            errorMessage.classList.add('active');
            
            setTimeout(() => {
                errorMessage.classList.remove('active');
            }, 3000);
        }

        // Initiale Nachricht
        window.addEventListener('load', function() {
            loadPreferences();
            showNotification('Klicken Sie auf "Aktuelle Angebote abrufen" um zu beginnen!', 'info');
