name: OCR Supermarkt Scraper

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 5 * * 1,4'
  workflow_dispatch:
    inputs:
      debug:
        description: Debug-Modus aktivieren
        required: false
        default: 'false'
        type: boolean

jobs:
  scrape-deals:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr tesseract-ocr-deu tesseract-ocr-eng libtesseract-dev libleptonica-dev pkg-config libvips-dev xvfb
        
    - name: Verify Tesseract
      run: |
        tesseract --version
        tesseract --list-langs
        
    - name: Install Dependencies
      run: npm install
        
    - name: Run OCR Scraper
      env:
        DEBUG_OCR: ${{ github.event.inputs.debug }}
        NODE_ENV: production
      run: |
        export DISPLAY=:99
        Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        sleep 3
        timeout 25m node scraper.js
        
    - name: Validate Results
      run: |
        if [ -f "deals.json" ]; then
          echo "deals.json created successfully"
          node -e "const data=JSON.parse(require('fs').readFileSync('deals.json','utf8'));const total=(data.migros||[]).length+(data.coop||[]).length+(data.aldi||[]).length+(data.lidl||[]).length;console.log('Total deals found:',total);if(total===0)process.exit(1);"
        else
          echo "Error: deals.json not found"
          exit 1
        fi
        
    - name: Commit and Push
      run: |
        git config user.email "action@github.com"
        git config user.name "OCR Bot"
        git add deals.json
        git commit -m "OCR Update $(date +%Y-%m-%d)"
        git push
        
    - name: Create Summary
      run: |
        echo "# OCR Results" >> $GITHUB_STEP_SUMMARY
        echo "Date: $(date)" >> $GITHUB_STEP_SUMMARY
        if [ -f "deals.json" ]; then
          node -e "const d=JSON.parse(require('fs').readFileSync('deals.json','utf8'));console.log('Migros:',(d.migros||[]).length);console.log('Coop:',(d.coop||[]).length);console.log('Aldi:',(d.aldi||[]).length);console.log('Lidl:',(d.lidl||[]).length);" >> $GITHUB_STEP_SUMMARY
        fi
