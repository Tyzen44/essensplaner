name: Scrape Supermarkt Angebote

on:
  schedule:
    - cron: '0 5 * * 1,4'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ca-certificates fonts-liberation libappindicator3-1 libasound2t64 \
          libatk-bridge2.0-0 libatk1.0-0 libcups2 libdbus-1-3 \
          libgdk-pixbuf2.0-0 libnspr4 libnss3 libx11-xcb1 libxcomposite1 \
          libxdamage1 libxrandr2 xdg-utils

    - name: Install Node.js dependencies
      run: npm ci

    - name: Scrape Angebote
      run: node scraper.js

    - name: Commit und Push Änderungen
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add deals.json
        if ! git diff --cached --quiet; then
          git commit -m "Update Angebote - $(date +'%Y-%m-%d %H:%M')"
          git push
        else
          echo "🟡 Keine Änderungen – kein Commit nötig"
        fi
